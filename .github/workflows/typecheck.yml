name: Typecheck

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  typecheck:
    name: Run TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run prettier check
        run: npm run format:check
      - name: Run ESLint
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Upload Typecheck result
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tsc-output
          path: .
      - name: Complete
        run: echo "Typecheck and lint completed"
